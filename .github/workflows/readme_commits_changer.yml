name: Update Commit Count

on:
  push:
    branches:
      - main  
  workflow_dispatch: 
  schedule:
  - cron: '0 0 * * *'
permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Calculate Total Commits
        id: count_commits
        run: |
          COUNT=$(git log --oneline | wc -l)
          echo "Total commits: $COUNT"
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Update README.md
        run: |
          COUNT=${{ steps.count_commits.outputs.count }}
          # Replace the content between the comment tags
          sed -i "s/<!-- COMMIT_COUNT_START -->.*<!-- COMMIT_COUNT_END -->/<!-- COMMIT_COUNT_START --> Total Commits: $COUNT <!-- COMMIT_COUNT_END -->/g" README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Only commit if something actually changed to avoid endless loops
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update total commit count to ${{ steps.count_commits.outputs.count }} [skip ci]" && git push)
